<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Tropicales JW | Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://worldtimeapi.org; frame-ancestors 'none'; form-action 'self'">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #070707;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: #0D0D0D;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      font-size: 2rem;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 5px;
    }
    .login-logo span { color: #C4942E; }
    .login-sub {
      color: #A0A0A0;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      color: #F1F5F9;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #2A2A2A;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
      background: #111;
      color: #F1F5F9;
    }
    .form-group input:focus {
      border-color: #C4942E;
      box-shadow: 0 0 0 3px rgba(196,148,46,0.2);
    }
    .btn {
      width: 100%;
      padding: 13px;
      background: #C4942E;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: #9D6C20;
      transform: translateY(-1px);
    }
    .error {
      background: #1A0A0A;
      color: #7F2925;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .error.show { display: block; }
    .login-footer {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #A0A0A0;
    }
    @media (max-width: 480px) {
      .login-container { padding: 25px 20px; margin: 15px; }
      .login-logo { font-size: 1.6rem; }
    }

    /* NOTA: @media (prefers-color-scheme: dark) y html.dark eliminados.
       El sitio usa solo tema oscuro fijo con paleta tropical. */
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">Tropicales JW <span>Admin</span></div>
    <p class="login-sub">Acceso al panel de administración</p>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Ingresar</button>
    </form>

    <p class="login-footer">Solo personal autorizado</p>
  </div>

  <!-- theme.js eliminado: solo modo oscuro fijo -->
  <script>
    if (sessionStorage.getItem('admin_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
  <script>
    const USERS = ['Hamlet'];
    const HASH = 'ef797c8118f02dfb649607dd5d3f8c7623048c9c063d532cc95c5ed7a898a64f';

    var intentos = 0;
    var bloqueado = false;

    async function hashPassword(pw) {
      var enc = new TextEncoder().encode(pw);
      var buf = await crypto.subtle.digest('SHA-256', enc);
      var arr = Array.from(new Uint8Array(buf));
      return arr.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (bloqueado) { return; }

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var errEl = document.getElementById('errorMsg');

      var pwHash = await hashPassword(password);

      if (USERS.includes(username) && pwHash === HASH) {
        sessionStorage.setItem('admin_user', username);
        window.location.href = 'dashboard.html';
      } else {
        intentos++;
        errEl.textContent = 'Usuario o contraseña incorrectos';
        if (intentos >= 5) {
          bloqueado = true;
          errEl.textContent = 'Demasiados intentos. Espera 30 segundos.';
          setTimeout(function() { intentos = 0; bloqueado = false; errEl.className = 'error'; }, 30000);
        }
        errEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
